# Build the extension and publish a GitHub Release when package.json version changes
# Each version is released exactly once: keyed on the v<version> tag, not a commit diff

name: Release

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Decide whether to release
        id: gate
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            EXISTS=true
          else
            EXISTS=false
          fi
          # Release a new version (tag absent); manual runs rebuild even if it exists
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$EXISTS" = "false" ]; then
            PROCEED=true
          else
            PROCEED=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"
          echo "Version $VERSION, tag $TAG exists=$EXISTS -> proceed=$PROCEED"

      - name: Setup Node
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.proceed == 'true'
        run: npm ci

      - name: Build and package VSIX
        if: steps.gate.outputs.proceed == 'true'
        run: npm run package # runs vscode:prepublish (compile) then vsce package

      - name: Extract release notes from CHANGELOG
        if: steps.gate.outputs.proceed == 'true'
        id: notes
        run: |
          VERSION="${{ steps.gate.outputs.version }}"
          # Grab the CHANGELOG section for this version (its heading to the next "## ")
          awk -v v="$VERSION" '
            $0 ~ "^## " v "( |\\()" {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "Release of pdf-viewer $VERSION." > /tmp/notes.md
          fi
          echo "path=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: Tag the release commit
        if: steps.gate.outputs.proceed == 'true'
        run: |
          TAG="${{ steps.gate.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping tag creation"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "pdf-viewer ${{ steps.gate.outputs.version }}"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Create or update GitHub Release
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.gate.outputs.tag }}"
          VSIX=$(ls *.vsix | head -1)
          echo "Publishing $VSIX as $TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" --clobber
          else
            gh release create "$TAG" "$VSIX" \
              --title "$TAG" \
              --notes-file "${{ steps.notes.outputs.path }}"
          fi
